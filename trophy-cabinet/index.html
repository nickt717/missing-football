<meta property="og:title" content="Trophy Cabinet вАФ Daily Football Puzzle">
<meta property="og:description" content="Can you identify the footballer from their trophy haul? A new puzzle every day.">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-pitch:#2d8c45;--green-dark:#1e6130;--white:#ffffff;--off-white:#f2f0eb;
  --bg:#0f0f0f;--bg-card:#1a1a1a;--bg-elevated:#242424;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.18);
  --text-primary:#f2f0eb;--text-muted:#888;--text-dim:#555;
  --accent:#f5c518;--accent-dim:rgba(245,197,24,0.15);
  --red:#e03c31;--green-result:#27ae60;
  --radius:10px;--radius-sm:6px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:3rem}
.site-header{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
html.in-iframe .site-header{display:none}
.header-inner{max-width:560px;margin:0 auto;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;line-height:1;text-decoration:none;color:inherit}
.home-link{color:var(--text-muted);font-size:12px;font-weight:500;text-decoration:none;letter-spacing:.02em;display:flex;align-items:center;gap:3px;transition:color .15s;white-space:nowrap}
.home-link:hover{color:var(--text-primary)}
.logo-missing{color:var(--text-primary)}
.logo-trophy{color:var(--accent)}
.header-nav{display:flex;gap:.25rem}
.nav-btn{background:none;border:none;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:.4rem .75rem;border-radius:var(--radius-sm);cursor:pointer;transition:.15s}
.nav-btn:hover{color:var(--text-primary);background:var(--bg-elevated)}
.nav-btn.active{color:var(--accent);background:var(--accent-dim)}
.view{display:none;max-width:560px;margin:0 auto;padding:1.25rem}
.view.active{display:block}
.puzzle-meta{margin-bottom:1.25rem;text-align:center}
.puzzle-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;padding:.3rem .8rem;margin-bottom:.6rem}
.puzzle-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;color:var(--text-primary);margin-bottom:.25rem}
.puzzle-sub{font-size:13px;color:var(--text-muted);line-height:1.5}
.trophy-grid{display:grid;gap:.5rem;margin-bottom:1.25rem}
.trophy-row{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;transition:.15s}
.trophy-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.trophy-info{flex:1;min-width:0}
.trophy-name{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.3}
.trophy-detail{font-size:12px;color:var(--text-muted);margin-top:.1rem}
.trophy-count{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);flex-shrink:0;min-width:24px;text-align:right}
.hints-section{margin-bottom:1rem}
.hint-row{margin-bottom:.5rem}
.hint-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:.35rem .75rem;border-radius:20px;cursor:pointer;transition:.15s}
.hint-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.hint-btn:disabled{opacity:.4;cursor:default}
.hint-btn.used{background:var(--accent-dim);border-color:rgba(245,197,24,.3);color:var(--accent)}
.hint-reveal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .9rem;font-size:13px;color:var(--text-muted);margin-top:.5rem;display:none}
.hint-reveal.visible{display:block}
.hint-reveal strong{color:var(--text-primary)}
.guess-area{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1rem .75rem}
.attempts-track{display:flex;gap:6px;justify-content:center;margin-bottom:.9rem}
.pip{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--text-dim);background:transparent;transition:.2s}
.pip.correct{background:var(--green-result);border-color:var(--green-result)}
.pip.wrong{background:var(--red);border-color:var(--red)}
.result-banner{margin-bottom:.75rem;border-radius:var(--radius-sm);overflow:hidden}
.result-msg{padding:.7rem 1rem;font-size:14px;font-weight:500;text-align:center}
.result-msg.success{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.3);color:#4ecf82}
.result-msg.fail{background:rgba(224,60,49,.1);border:1px solid rgba(224,60,49,.25);color:#f07068}
.input-row{display:flex;gap:.5rem}
#guess-input{flex:1;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14px;padding:.6rem .9rem;outline:none;transition:.15s}
#guess-input:focus{border-color:var(--accent)}
#guess-input::placeholder{color:var(--text-dim)}
#guess-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:.6rem 1.25rem;cursor:pointer;transition:.15s;white-space:nowrap}
#guess-btn:hover{background:#ffd700}
#guess-btn:disabled{opacity:.4;cursor:default}
.share-row{display:flex;justify-content:center;margin-top:.75rem}
#share-btn{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:.5rem 1.25rem;cursor:pointer;transition:.15s;display:none}
#share-btn:hover{border-color:var(--accent);color:var(--accent)}
#share-btn.visible{display:block}
@keyframes ng-fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes ng-pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,.4)}50%{box-shadow:0 0 0 8px rgba(245,197,24,0)}}
.next-game-btn{width:100%;padding:11px;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);border:1px solid var(--accent);color:#000;animation:ng-fadein .4s ease,ng-pulse 2s ease-in-out .4s infinite}
.next-game-btn:hover{background:#f7d04a;animation:none}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);z-index:50;max-height:180px;overflow-y:auto;display:none}
.autocomplete-list.open{display:block}
.autocomplete-item{padding:.55rem .9rem;font-size:13px;cursor:pointer;color:var(--text-primary);transition:.1s}
.autocomplete-item:hover,.autocomplete-item.selected{background:var(--accent-dim);color:var(--accent)}
.stats-section{padding:.5rem 0}
.stats-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-bottom:1rem;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.5rem}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .5rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-top:.2rem}
.dist-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.6rem}
.dist-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.dist-label{font-size:12px;color:var(--text-muted);width:28px;flex-shrink:0}
.dist-bar-wrap{flex:1;background:var(--bg-elevated);border-radius:3px;height:18px;overflow:hidden}
.dist-bar{background:var(--accent);height:100%;border-radius:3px;min-width:4px;transition:.4s}
.dist-count{font-size:12px;color:var(--text-muted);width:20px;text-align:right;flex-shrink:0}
.reset-btn{display:block;margin:1.25rem auto 0;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12px;padding:.4rem .9rem;cursor:pointer;transition:.15s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.archive-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-bottom:.3rem;text-align:center}
.archive-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:1rem}
.archive-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.7rem 1rem;margin-bottom:.4rem;cursor:pointer;text-decoration:none;color:inherit;transition:.15s}
.archive-item:hover{border-color:var(--border-strong);background:var(--bg-elevated)}
.archive-puzzle-num{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
.archive-player{font-size:14px;font-weight:600;color:var(--text-primary);margin-top:.1rem}
.archive-hint{font-size:12px;color:var(--text-muted);margin-top:.1rem}
.archive-arrow{color:var(--text-dim);font-size:16px}
.archive-item.solved .archive-player{color:var(--green-result)}
.archive-item.failed .archive-player{color:var(--red)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(0);background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--text-primary);font-size:13px;font-weight:500;padding:.6rem 1.25rem;border-radius:24px;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:999;animation:toast-in .25s ease,toast-out .25s ease 1.8s forwards}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toast-out{from{opacity:1}to{opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}

</style>

const MAX_ATTEMPTS = 3;
const EPOCH = new Date('2026-03-25T00:00:00Z');
const dayNum = Math.floor((Date.now() - EPOCH.getTime()) / 86400000);
const puzzleIndex = dayNum < 0 ? 0 : dayNum % PUZZLES.length;
const puzzle = PUZZLES[puzzleIndex];
const STORAGE_KEY = 'tc-game-' + puzzleIndex;
const STATS_KEY = 'tc-stats';
let state = { attempts: 0, solved: false, failed: false, hintUsed: false, guesses: [] };
let statsData = { played: 0, won: 0, streak: 0, dist: { 1: 0, 2: 0, 3: 0, miss: 0 } };
function init() {
  loadStats();
  const testMode = window.location.search.includes('test=1');
  const saved = testMode ? null : localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
  renderPuzzle();
  renderPips();
  renderTrophies();
  restoreHints();
  restoreBanner();
  renderArchive();
  renderStats();
  if (state.solved || state.failed) {
    lockInput();
    document.getElementById('share-btn').classList.add('visible');
    setTimeout(()=>{document.getElementById('next-game-row').style.display='block';},2500);
  }
}
function renderPuzzle() {
  document.getElementById('puzzle-badge').textContent = 'Puzzle #' + Math.max(1, dayNum + 1);
  document.getElementById('puzzle-title').textContent = 'Whose Trophy Cabinet?';
  document.getElementById('puzzle-sub').textContent = 'Identify the footballer from their trophy haul вАФ ' + puzzle.trophies.length + ' honours on display';
}
function renderTrophies() {
  const grid = document.getElementById('trophy-grid');
  grid.innerHTML = '';
  puzzle.trophies.forEach(t => {
    const row = document.createElement('div');
    row.className = 'trophy-row';
    const countDisplay = typeof t.count === 'number' ? '√Ч' + t.count : t.count;
    row.innerHTML = '<div class="trophy-icon">' + t.icon + '</div><div class="trophy-info"><div class="trophy-name">' + t.name + '</div></div><div class="trophy-count">' + countDisplay + '</div>';
    grid.appendChild(row);
  });
}
function renderPips() {
  const track = document.getElementById('attempts-track');
  track.innerHTML = '';
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    pip.id = 'pip-' + i;
    if (i < state.guesses.length) pip.classList.add(state.guesses[i].correct ? 'correct' : 'wrong');
    track.appendChild(pip);
  }
}
function restoreHints() {
  const btn = document.getElementById('hint-btn');
  if (state.hintUsed) {
    if (btn) { btn.classList.add('used'); btn.disabled = true; }
    const reveal = document.getElementById('hint-reveal');
    reveal.innerHTML = 'Nationality: ' + puzzle.nationality;
    reveal.classList.add('visible');
  } else if (state.attempts >= 2 && !state.solved && !state.failed) {
    if (btn) btn.disabled = false;
  }
}
function restoreBanner() {
  if (state.solved) {
    showBanner('вЬУ Correct! It was <strong>' + puzzle.player + '</strong>', 'success');
  } else if (state.failed) {
    showBanner('The answer was <strong>' + puzzle.player + '</strong>', 'fail');
  } else if (state.guesses.length > 0) {
    const remaining = MAX_ATTEMPTS - state.attempts;
    showBanner('вЬЧ Not quite вАФ ' + remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' left', 'fail');
  }
}
function showHint() {
  if (state.solved || state.failed || state.hintUsed) return;
  state.hintUsed = true;
  saveState();
  const btn = document.getElementById('hint-btn');
  if (btn) { btn.classList.add('used'); btn.disabled = true; }
  const reveal = document.getElementById('hint-reveal');
  reveal.innerHTML = 'Nationality: ' + puzzle.nationality;
  reveal.classList.add('visible');
}
const ALL_NAMES = [...new Set(PUZZLES.map(p => p.player))];
let acIndex = -1;
function onInput() {
  const val = document.getElementById('guess-input').value.trim();
  const list = document.getElementById('autocomplete-list');
  acIndex = -1;
  if (val.length < 2) { list.classList.remove('open'); list.innerHTML = ''; return; }
  const matches = ALL_NAMES.filter(n => n.toLowerCase().includes(val.toLowerCase())).slice(0, 6);
  if (!matches.length) { list.classList.remove('open'); return; }
  list.innerHTML = matches.map(m => '<div class="autocomplete-item" onclick="selectAC(\'' + m + '\')">' + m + '</div>').join('');
  list.classList.add('open');
}
function selectAC(name) {
  document.getElementById('guess-input').value = name;
  document.getElementById('autocomplete-list').classList.remove('open');
  document.getElementById('autocomplete-list').innerHTML = '';
  acIndex = -1;
}
function onKeyDown(e) {
  const list = document.getElementById('autocomplete-list');
  const items = list.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('selected', i === acIndex)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, -1); items.forEach((el, i) => el.classList.toggle('selected', i === acIndex)); }
  else if (e.key === 'Enter') { if (acIndex >= 0 && items[acIndex]) { selectAC(items[acIndex].textContent); } else { submitGuess(); } }
  else if (e.key === 'Escape') { list.classList.remove('open'); }
}
document.addEventListener('click', e => { if (!e.target.closest('.autocomplete-wrap')) document.getElementById('autocomplete-list').classList.remove('open'); });
function submitGuess() {
  if (state.solved || state.failed) return;
  const input = document.getElementById('guess-input');
  const raw = input.value.trim();
  if (!raw) { shakeInput(); return; }
  document.getElementById('autocomplete-list').classList.remove('open');
  const guess = raw.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  const correct = puzzle.acceptedAnswers.some(a => a.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '') === guess);
  const pip = document.getElementById('pip-' + state.attempts);
  state.attempts++;
  state.guesses.push({ guess: raw, correct });
  if (pip) pip.classList.add(correct ? 'correct' : 'wrong');
  input.value = '';
  if (!correct && state.attempts >= 2 && !state.hintUsed) { const hBtn = document.getElementById('hint-btn'); if (hBtn) hBtn.disabled = false; }
  if (correct) {
    state.solved = true;
    showBanner('вЬУ Correct! It was <strong>' + puzzle.player + '</strong>', 'success');
    lockInput();
    document.getElementById('share-btn').classList.add('visible');
    setTimeout(()=>{document.getElementById('next-game-row').style.display='block';},2500);
    recordResult(true);
    if(window.parent!==window){window.parent.postMessage({type:'gameComplete',result:'win'},'*');}
  } else if (state.attempts >= MAX_ATTEMPTS) {
    state.failed = true;
    showBanner('The answer was <strong>' + puzzle.player + '</strong>', 'fail');
    lockInput();
    document.getElementById('share-btn').classList.add('visible');
    setTimeout(()=>{document.getElementById('next-game-row').style.display='block';},2500);
    recordResult(false);
    if(window.parent!==window){window.parent.postMessage({type:'gameComplete',result:'loss'},'*');}
  } else {
    const remaining = MAX_ATTEMPTS - state.attempts;
    showBanner('вЬЧ Not quite вАФ ' + remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' left', 'fail');
  }
  saveState();
}
function shakeInput() {
  const input = document.getElementById('guess-input');
  input.style.animation = 'shake .3s ease';
  setTimeout(() => input.style.animation = '', 300);
}
function showBanner(html, type) {
  const banner = document.getElementById('result-banner');
  banner.innerHTML = '<div class="result-msg ' + type + '">' + html + '</div>';
}
function lockInput() {
  document.getElementById('guess-input').disabled = true;
  document.getElementById('guess-btn').disabled = true;
}
function recordResult(won) {
  loadStats();
  statsData.played++;
  if (won) { statsData.won++; statsData.streak++; statsData.dist[state.attempts]++; }
  else { statsData.streak = 0; statsData.dist.miss++; }
  saveStats();
  renderStats();
}
function loadStats() {
  const s = localStorage.getItem(STATS_KEY);
  if (s) statsData = JSON.parse(s);
}
function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(statsData)); }
function renderStats() {
  document.getElementById('stat-played').textContent = statsData.played;
  document.getElementById('stat-won').textContent = statsData.won;
  document.getElementById('stat-streak').textContent = statsData.streak;
  document.getElementById('stat-pct').textContent = statsData.played ? Math.round((statsData.won / statsData.played) * 100) + '%' : '0%';
  const max = Math.max(1, ...Object.values(statsData.dist));
  [1, 2, 3, 'miss'].forEach(k => {
    const v = statsData.dist[k] || 0;
    document.getElementById('bar-' + k).style.width = Math.round((v / max) * 100) + '%';
    document.getElementById('cnt-' + k).textContent = v;
  });
}
function resetStats() {
  if (!confirm('Reset all stats?')) return;
  statsData = { played: 0, won: 0, streak: 0, dist: { 1: 0, 2: 0, 3: 0, miss: 0 } };
  saveStats();
  renderStats();
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function showShareOptions(text) {
  // Try native share first (mobile)
  if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
    navigator.share({ text }).catch(() => copyToClipboard(text));
    return;
  }
  // On desktop: copy to clipboard + show WhatsApp button
  copyToClipboard(text);
  // Show a WhatsApp share option in the toast
  const waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.cssText = 'display:flex;align-items:center;gap:.75rem;';
  t.innerHTML = '<span>Copied!</span><a href="' + waUrl + '" target="_blank" style="color:#25D366;font-weight:600;text-decoration:none;font-size:13px;">WhatsApp вЖЧ</a>';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function shareResult() {
  const icons = state.guesses.map(g => g.correct ? 'рЯЯ©' : 'рЯЯ•').join('');
  const solved = state.solved;
  const line1 = 'рЯПЖ Trophy Cabinet #' + puzzle.id;
  const line2 = solved
    ? icons + '  Solved in ' + state.attempts + '!'
    : icons + '  Not today!';
  const line3 = 'missingfootball.com/trophy-cabinet';
  const text = line1 + '\n' + line2 + '\n' + line3;
  showShareOptions(text);
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
function renderArchive() {
  const list = document.getElementById('archive-list');
  list.innerHTML = '';
  const maxIdx = Math.min(Math.max(0, dayNum), PUZZLES.length - 1);
  PUZZLES.forEach((p, i) => {
    if (i > maxIdx) return;
    const saved = localStorage.getItem('tc-game-' + i);
    const s = saved ? JSON.parse(saved) : null;
    const statusClass = s ? (s.solved ? 'solved' : s.failed ? 'failed' : '') : '';
    const a = document.createElement('a');
    a.className = 'archive-item ' + statusClass;
    a.href = '#';
    a.innerHTML = '<div class="archive-item-left"><div class="archive-puzzle-num">Puzzle #' + p.id + '</div><div class="archive-player">' + p.trophies.length + ' trophies on display</div></div><div class="archive-arrow">вАЇ</div>';
    a.addEventListener('click', e => { e.preventDefault(); loadArchivePuzzle(i); });
    list.appendChild(a);
  });
}
function loadArchivePuzzle(index) {
  const p = PUZZLES[index];
  document.getElementById('puzzle-badge').textContent = 'Puzzle #' + p.id + ' (Archive)';
  document.getElementById('puzzle-sub').textContent = p.nationality + ' ¬Ј ' + p.position;
  const grid = document.getElementById('trophy-grid');
  grid.innerHTML = '';
  p.trophies.forEach(t => {
    const row = document.createElement('div');
    row.className = 'trophy-row';
    const countDisplay = typeof t.count === 'number' ? '√Ч' + t.count : t.count;
    row.innerHTML = '<div class="trophy-icon">' + t.icon + '</div><div class="trophy-info"><div class="trophy-name">' + t.name + '</div></div><div class="trophy-count">' + countDisplay + '</div>';
    grid.appendChild(row);
  });
  document.getElementById('next-game-row').style.display='none';
  setView('game');
  showToast('Archive: Puzzle #' + p.id);
}
function setView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelector('[data-view="' + v + '"]').classList.add('active');
  if (v === 'archive') renderArchive();
  if (v === 'stats') renderStats();
  if (v === 'game') { renderPuzzle(); renderTrophies(); renderPips(); }
}
if(window.self!==window.top){document.documentElement.classList.add('in-iframe');}
init();
</script>
