html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:3rem}
.site-header{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:560px;margin:0 auto;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.logo{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;line-height:1;flex-shrink:0}
.logo-main{font-size:19px;color:var(--text-primary)}
.logo-sub{font-size:19px;color:var(--accent);margin-left:5px}
.header-nav{display:flex;gap:4px;flex-shrink:0}
.nav-btn{background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:5px 12px;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
.nav-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.home-link{color:var(--text-muted);font-size:12px;font-weight:500;text-decoration:none;letter-spacing:.02em;display:flex;align-items:center;gap:3px;transition:color .15s;white-space:nowrap;flex-shrink:0}
.home-link:hover{color:var(--text-primary)}
.view{display:none;max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 0}
.view.active{display:block}
.puzzle-meta{text-align:center;margin-bottom:1.1rem}
.puzzle-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(232,168,56,.3);border-radius:20px;padding:3px 12px;margin-bottom:.6rem}
.puzzle-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;color:var(--text-primary);margin-bottom:.25rem}
.puzzle-sub{font-size:12px;color:var(--text-muted)}
.match-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.match-competition{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem}
.match-score{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.03em;color:var(--text-primary);margin-bottom:.2rem}
.match-info{font-size:12px;color:var(--text-muted);margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.team-section{margin-bottom:.75rem}
.team-section:last-child{margin-bottom:0}
.team-header{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.35rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.scorer-row{display:flex;align-items:center;gap:10px;padding:.45rem 0;border-bottom:1px solid var(--border)}
.scorer-row:last-child{border-bottom:none}
.scorer-minute{font-size:12px;color:var(--text-dim);width:36px;text-align:right;flex-shrink:0;font-weight:500}
.scorer-name{font-size:15px;font-weight:500;color:var(--text-primary)}
.missing-slot{display:inline-flex;align-items:center;background:var(--accent-dim);border:1px dashed rgba(232,168,56,.45);border-radius:var(--radius-sm);padding:2px 10px;color:var(--accent);font-size:14px;font-weight:600;letter-spacing:.04em}
.guess-section{margin-top:1rem}
.pips{display:flex;gap:6px;justify-content:center;margin-bottom:.85rem}
.pip{width:10px;height:10px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-strong);transition:all .2s}
.pip.correct{background:var(--green);border-color:var(--green)}
.pip.wrong{background:var(--red);border-color:var(--red)}
.guess-input-row{display:flex;gap:8px}
.autocomplete-wrap{flex:1;position:relative}
#guess-input{width:100%;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:15px;padding:10px 14px;outline:none;transition:border .15s}
#guess-input:focus{border-color:var(--accent)}
#guess-input::placeholder{color:var(--text-dim)}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);z-index:200;max-height:200px;overflow-y:auto;display:none}
.autocomplete-list.open{display:block}
.autocomplete-item{padding:8px 14px;font-size:14px;color:var(--text-primary);cursor:pointer;transition:background .1s}
.autocomplete-item:hover,.autocomplete-item.selected{background:var(--accent-dim);color:var(--accent)}
.guess-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:10px 20px;cursor:pointer;transition:background .15s;white-space:nowrap}
.guess-btn:hover{background:#f0b840}
.hint-reveal{margin-top:.6rem;font-size:13px;color:var(--text-muted);min-height:18px;line-height:1.5}
.hint-reveal strong{color:var(--text-primary)}
.result-banner{margin-top:.75rem;border-radius:var(--radius-sm);overflow:hidden}
.result-msg{padding:.7rem 1rem;font-size:14px;font-weight:500;text-align:center}
.result-msg.success{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.3);color:#4ecf82}
.result-msg.fail{background:rgba(224,60,49,.1);border:1px solid rgba(224,60,49,.25);color:#f07068}
.post-game-btns{display:flex;gap:8px;margin-top:.75rem;justify-content:center}
.pg-btn{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer}
.pg-btn:hover{border-color:var(--accent);color:var(--accent)}
.pg-btn.share-btn{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.countdown-row{margin-top:10px;text-align:center;font-size:13px;color:var(--text-muted)}
.countdown-row strong{color:var(--text-primary)}
.archive-grid{display:flex;flex-direction:column;gap:8px}
.archive-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border .15s}
.archive-card:hover{border-color:var(--border-strong)}
.archive-card-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.archive-card-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.archive-card-arrow{color:var(--text-dim);font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .5rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text-primary);line-height:1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dist-label{font-size:12px;color:var(--text-muted);width:50px;text-align:right;flex-shrink:0}
.dist-bar-wrap{flex:1;background:var(--bg-elevated);border-radius:3px;height:16px;overflow:hidden}
.dist-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.dist-n{font-size:12px;color:var(--text-muted);width:24px;text-align:right;flex-shrink:0}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;padding:.6rem 1.1rem;z-index:999;pointer-events:none;white-space:nowrap}

// Build autocomplete list from all unique player names across all puzzles
const ALL_PLAYERS = (()=>{
  const set = new Set();
  PUZZLES.forEach(puz=>{
    puz.scorers.forEach(s=>{ if(s.name) set.add(s.name); });
    if(puz.hidden) set.add(puz.hidden);
  });
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
})();

function getShuffledPuzzles() {
  const seed = 42;
  const arr = [...PUZZLES];
  // Seeded shuffle (Mulberry32)
  let s = seed;
  function rand() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
const ORDERED_PUZZLES = getShuffledPuzzles();

function loadStorage(){try{const r=localStorage.getItem('mg_v1');return r?JSON.parse(r):{stats:defaultStats(),sessions:{}};}catch{return{stats:defaultStats(),sessions:{}};}}
function saveStorage(d){try{localStorage.setItem('mg_v1',JSON.stringify(d));}catch{}}
function defaultStats(){return{played:0,wins:0,streak:0,bestStreak:0,dist:{1:0,2:0,3:0,miss:0}};}
let storage=loadStorage();

function getDayNum(){return Math.floor((Date.now()-new Date('2026-02-02T00:00:00Z').getTime())/86400000);}
function getDailyPuzzleIndex(){const d=getDayNum();return d<0?0:d%ORDERED_PUZZLES.length;}
function normalise(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").trim();}
function checkGuess(guess,puz){
  const g=normalise(guess);
  const h=normalise(puz.hidden);
  if(g===h)return true;
  const parts=h.split(' ');
  return parts.length>1&&parts[parts.length-1].length>2&&g===parts[parts.length-1];
}

// --- Autocomplete ---
function getAcList(){return document.getElementById('autocomplete-list');}
function closeAc(){const l=getAcList();l.innerHTML='';l.classList.remove('open');acSelectedIndex=-1;}
function openAc(matches){
  const l=getAcList();l.innerHTML='';acSelectedIndex=-1;
  if(!matches.length){l.classList.remove('open');return;}
  matches.forEach((name,i)=>{
    const item=document.createElement('div');item.className='autocomplete-item';item.textContent=name;
    item.addEventListener('mousedown',e=>{e.preventDefault();document.getElementById('guess-input').value=name;closeAc();});
    l.appendChild(item);
  });
  l.classList.add('open');
}
function updateAcSelection(delta){
  const items=getAcList().querySelectorAll('.autocomplete-item');
  if(!items.length)return;
  items.forEach(it=>it.classList.remove('selected'));
  acSelectedIndex=Math.max(-1,Math.min(items.length-1,acSelectedIndex+delta));
  if(acSelectedIndex>=0){items[acSelectedIndex].classList.add('selected');items[acSelectedIndex].scrollIntoView({block:'nearest'});}
}

document.addEventListener('DOMContentLoaded',()=>{
  state.puzzleIndex=getDailyPuzzleIndex();
  loadPuzzle(state.puzzleIndex);
  document.getElementById('puzzle-badge').textContent='PUZZLE #'+Math.max(1,getDayNum()+1);
  renderArchive();renderStats();

  const input=document.getElementById('guess-input');
  input.addEventListener('input',()=>{
    const val=input.value.trim();
    if(!val){closeAc();return;}
    const norm=normalise(val);
    const matches=ALL_PLAYERS.filter(n=>normalise(n).startsWith(norm)).slice(0,8);
    openAc(matches);
  });
  input.addEventListener('keydown',e=>{
    const l=getAcList();
    if(e.key==='ArrowDown'){e.preventDefault();updateAcSelection(1);}
    else if(e.key==='ArrowUp'){e.preventDefault();updateAcSelection(-1);}
    else if(e.key==='Enter'){
      if(acSelectedIndex>=0&&l.classList.contains('open')){
        const sel=l.querySelectorAll('.autocomplete-item')[acSelectedIndex];
        if(sel){input.value=sel.textContent;closeAc();}
      } else {
        closeAc();submitGuess();
      }
    } else if(e.key==='Escape'){closeAc();}
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('.autocomplete-wrap'))closeAc();
  });
});

function loadPuzzle(idx){
  puzzle=ORDERED_PUZZLES[idx];
  state.puzzleIndex=idx;state.attempts=0;state.solved=false;state.failed=false;state.hintShown=false;
  document.getElementById('puzzle-badge').textContent='PUZZLE #'+puzzle.id;
  document.getElementById('puzzle-title').textContent=puzzle.team1+' vs '+puzzle.team2;
  document.getElementById('puzzle-sub').textContent='Who is the missing goalscorer?';
  document.getElementById('match-competition').textContent=puzzle.competition;
  document.getElementById('match-score').textContent=puzzle.team1+' '+puzzle.score+' '+puzzle.team2;
  document.getElementById('match-info').textContent=puzzle.date;
  document.getElementById('result-banner').innerHTML='';
  document.getElementById('hint-reveal').innerHTML='';
  document.getElementById('post-game-btns').style.display='none';
  document.getElementById('countdown-row').style.display='none';
  document.getElementById('completion-row').style.display='none';
  document.getElementById('guess-input-row').style.display='flex';
  document.getElementById('guess-input').value='';
  document.getElementById('guess-input').disabled=false;
  document.querySelector('.guess-btn').disabled=false;
  closeAc();
  resetPips();
  renderScorers(false);

  const saved=storage.sessions['p'+idx];
  if(saved){
    state.attempts=saved.attempts||0;state.solved=saved.solved||false;state.failed=saved.failed||false;state.hintShown=saved.hintShown||false;
    [0,1,2].forEach(i=>{const el=document.getElementById('pip-'+i);if(el&&saved.pips&&saved.pips[i])el.classList.add(saved.pips[i]);});
    if(state.hintShown)document.getElementById('hint-reveal').innerHTML='💡 Nationality: <strong>'+puzzle.hint+'</strong>';
    if(state.solved||state.failed){renderScorers(true);showEndState(state.solved,puzzle);}
  }
}

function renderScorers(reveal){
  const container=document.getElementById('scorers-list');container.innerHTML='';
  [puzzle.team1,puzzle.team2].forEach(team=>{
    const teamScorers=puzzle.scorers.filter(s=>s.team===team);
    if(!teamScorers.length)return;
    const section=document.createElement('div');section.className='team-section';
    const header=document.createElement('div');header.className='team-header';header.textContent=team;
    section.appendChild(header);
    teamScorers.forEach(scorer=>{
      const isHidden=normalise(scorer.name)===normalise(puzzle.hidden);
      const row=document.createElement('div');row.className='scorer-row';
      const min=document.createElement('div');min.className='scorer-minute';min.textContent=scorer.minute;
      const name=document.createElement('div');name.className='scorer-name';
      if(isHidden&&!reveal){
        const slot=document.createElement('span');slot.className='missing-slot';slot.textContent='???';
        name.appendChild(slot);
      } else if(isHidden&&reveal){
        name.style.color=state.solved?'var(--green)':'var(--red)';
        name.textContent=scorer.name;
      } else {
        name.textContent=scorer.name;
      }
      row.appendChild(min);row.appendChild(name);section.appendChild(row);
    });
    container.appendChild(section);
  });
}

function submitGuess(){
  if(state.solved||state.failed)return;
  const input=document.getElementById('guess-input');const val=input.value.trim();if(!val){input.focus();return;}
  closeAc();
  const correct=checkGuess(val,puzzle);const pip=document.getElementById('pip-'+state.attempts);
  if(correct){
    pip.classList.add('correct');state.solved=true;
    recordResult(true,state.attempts+1);
    renderScorers(true);showEndState(true,puzzle);
  } else {
    pip.classList.add('wrong');state.attempts++;
    if(state.attempts>=2&&!state.hintShown){
      state.hintShown=true;
      document.getElementById('hint-reveal').innerHTML='💡 Nationality: <strong>'+puzzle.hint+'</strong>';
    }
    if(state.attempts>=state.maxAttempts){
      state.failed=true;recordResult(false,0);renderScorers(true);showEndState(false,puzzle);
    } else {
      const remaining=state.maxAttempts-state.attempts;
      document.getElementById('result-banner').innerHTML='<div class="result-msg fail">✗ Not quite — '+remaining+' attempt'+(remaining===1?'':'s')+' left</div>';
    }
  }
  input.value='';saveSession();
}

function showEndState(won,puz){
  const banner=document.getElementById('result-banner');
  if(won){banner.innerHTML='<div class="result-msg success">✓ Correct! The missing goalscorer was <strong>'+puz.hidden+'</strong></div>';}
  else{banner.innerHTML='<div class="result-msg fail">The missing goalscorer was <strong>'+puz.hidden+'</strong></div>';}
  document.getElementById('guess-input-row').style.display='none';
  document.getElementById('post-game-btns').style.display='flex';
  document.getElementById('countdown-row').style.display='block';
  startCountdown();
  showCompletionMessage(won);
}

function showCompletionMessage(won){
  const today=new Date().toISOString().slice(0,10);
  const others=[
    {lp:'xi_lastPlayed',lr:'xi_lastResult'},
    {lp:'mc_lastPlayed',lr:'mc_lastResult'},
    {lp:'tc_lastPlayed',lr:'tc_lastResult'},
    {lp:'mf_lastPlayed',lr:'mf_lastResult'}
  ];
  let wins=won?1:0;
  others.forEach(g=>{if(localStorage.getItem(g.lp)===today&&localStorage.getItem(g.lr)==='win')wins++;});
  const dateStr=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const row=document.getElementById('completion-row');
  row.innerHTML='<div style="padding:10px 0;border-top:1px solid var(--border);margin-top:6px">'
    +'<div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:4px">🎉 You\'ve played all 5 games today! Come back tomorrow for 5 new puzzles.</div>'
    +'<div>'+dateStr+' &mdash; Daily score: <strong style="color:var(--accent)">'+wins+'/5</strong></div>'
    +'</div>';
  row.style.display='block';
}

function startCountdown(){
  function update(){
    const now=new Date();
    const midnight=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1));
    const diff=midnight-now;
    if(diff<=0){document.getElementById('countdown-row').textContent='New puzzle available!';return;}
    const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);
    document.getElementById('countdown-row').innerHTML='Next puzzle in <strong>'+h+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s</strong>';
  }
  update();setInterval(update,1000);
}

function resetPips(){[0,1,2].forEach(i=>{const p=document.getElementById('pip-'+i);if(p)p.className='pip';});}
function getPipStates(){return[0,1,2].map(i=>{const p=document.getElementById('pip-'+i);if(p){if(p.classList.contains('correct'))return'correct';if(p.classList.contains('wrong'))return'wrong';}return null;});}

function saveSession(){
  const key='p'+state.puzzleIndex;
  storage.sessions[key]=Object.assign(storage.sessions[key]||{},{attempts:state.attempts,solved:state.solved,failed:state.failed,hintShown:state.hintShown,pips:getPipStates()});
  saveStorage(storage);
  if(state.solved||state.failed){
    const todayUTC=new Date().toISOString().slice(0,10);
    const lastPlayed=localStorage.getItem('mg_lastPlayed');
    const yesterdayUTC=new Date(Date.now()-86400000).toISOString().slice(0,10);
    const prevStreak=parseInt(localStorage.getItem('mg_streak')||'0',10);
    if(state.solved){
      const newStreak=(lastPlayed===yesterdayUTC||lastPlayed===todayUTC)?prevStreak+1:1;
      localStorage.setItem('mg_streak',String(newStreak));
      localStorage.setItem('mg_lastResult','win');
    } else {
      localStorage.setItem('mg_streak','0');
      localStorage.setItem('mg_lastResult','loss');
    }
    localStorage.setItem('mg_lastPlayed',todayUTC);
  }
}

function recordResult(won,guessNum){
  const s=storage.stats;s.played++;
  if(won){s.wins++;s.streak++;if(s.streak>s.bestStreak)s.bestStreak=s.streak;s.dist[guessNum]=(s.dist[guessNum]||0)+1;}
  else{s.streak=0;s.dist.miss=(s.dist.miss||0)+1;}
  saveStorage(storage);
}

function renderStats(){
  const s=storage.stats;
  document.getElementById('stat-played').textContent=s.played;
  document.getElementById('stat-wins').textContent=s.wins;
  document.getElementById('stat-streak').textContent=parseInt(localStorage.getItem('mg_streak')||'0',10);
  document.getElementById('stat-pct').textContent=s.played?Math.round(s.wins/s.played*100)+'%':'0%';
  const max=Math.max(1,s.dist[1]||0,s.dist[2]||0,s.dist[3]||0,s.dist.miss||0);
  ['1','2','3','miss'].forEach(k=>{const v=s.dist[k]||0;const bar=document.getElementById('dist-'+k);const num=document.getElementById('dist-'+k+'-n');if(bar)bar.style.width=(v/max*100)+'%';if(num)num.textContent=v;});
}

function renderArchive(){
  const grid=document.getElementById('archive-grid');grid.innerHTML='';
  const maxIdx=Math.min(Math.max(0,getDayNum()),ORDERED_PUZZLES.length-1);
  ORDERED_PUZZLES.forEach((puz,idx)=>{
    if(idx>maxIdx)return;
    const card=document.createElement('div');card.className='archive-card';
    const sess=storage.sessions['p'+idx];const status=sess?.solved?'✓':sess?.failed?'✗':'';
    card.innerHTML='<div><div class="archive-card-title">'+(status?status+' ':'')+puz.team1+' vs '+puz.team2+'</div><div class="archive-card-sub">'+puz.competition+' · '+puz.date+'</div></div><div class="archive-card-arrow">›</div>';
    card.addEventListener('click',()=>{loadPuzzle(idx);setView('game');});
    grid.appendChild(card);
  });
}

function showShareOptions(text){
  if(navigator.share&&/Mobi|Android/i.test(navigator.userAgent)){navigator.share({text}).catch(()=>copyToClipboard(text));return;}
  copyToClipboard(text);
  const waUrl='https://wa.me/?text='+encodeURIComponent(text);
  const existing=document.querySelector('.toast');if(existing)existing.remove();
  const t=document.createElement('div');t.className='toast';t.style.cssText='display:flex;align-items:center;gap:.75rem;';
  t.innerHTML='<span>Copied!</span><a href="'+waUrl+'" target="_blank" style="color:#25D366;font-weight:600;text-decoration:none;font-size:13px;">WhatsApp ↗</a>';
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function shareResult(){
  const pips=getPipStates().filter(p=>p!==null);
  const icons=pips.map(p=>p==='correct'?'🟩':'🟥').join('');
  const line1='⚽ Missing Goalscorer #'+puzzle.id;
  const line2=state.solved?icons+'  Solved in '+pips.length+'!':icons+'  Not today!';
  const line3='missingfootball.com/missing-goalscorer';
  showShareOptions(line1+'\n'+line2+'\n'+line3);
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text).catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
}

function setView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelector('[data-view="'+view+'"]').classList.add('active');
  if(view==='stats')renderStats();if(view==='archive')renderArchive();
}
</script>
