html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:3rem}
.site-header{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:560px;margin:0 auto;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;line-height:1}
.logo-main{font-size:22px;color:var(--text-primary)}
.logo-club{font-size:22px;color:var(--accent);margin-left:6px}
.header-nav{display:flex;gap:4px}
.nav-btn{background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:5px 12px;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
.nav-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.view{display:none;max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 0}
.view.active{display:block}
.puzzle-meta{text-align:center;margin-bottom:1.1rem}
.puzzle-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(245,197,24,.3);border-radius:20px;padding:3px 12px;margin-bottom:.6rem}
.puzzle-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;color:var(--text-primary);margin-bottom:.25rem}
.puzzle-sub{font-size:12px;color:var(--text-muted)}
.timeline-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.timeline{display:flex;flex-direction:column;gap:0}
.club-row{display:flex;align-items:center;gap:12px;padding:.6rem 0;border-bottom:1px solid var(--border)}
.club-row:last-child{border-bottom:none}
.club-num{font-size:11px;color:var(--text-dim);font-weight:600;width:18px;text-align:right;flex-shrink:0}
.club-dot{width:10px;height:10px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.club-dot.known{background:var(--accent)}
.club-dot.missing{background:var(--text-dim);border:2px dashed var(--accent)}
.club-info{flex:1;min-width:0}
.club-name{font-size:15px;font-weight:500;color:var(--text-primary)}
.club-years{font-size:12px;color:var(--text-muted);margin-top:2px}
.club-league{font-size:11px;color:var(--text-dim)}
.missing-slot{display:flex;align-items:center;justify-content:center;padding:.55rem .75rem;background:var(--accent-dim);border:1px dashed rgba(245,197,24,.4);border-radius:var(--radius-sm);color:var(--accent);font-size:14px;font-weight:600;letter-spacing:.05em}
.guess-section{margin-top:1rem}
.pips{display:flex;gap:6px;justify-content:center;margin-bottom:.85rem}
.pip{width:10px;height:10px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-strong);transition:all .2s}
.pip.correct{background:var(--green);border-color:var(--green)}
.pip.wrong{background:var(--red);border-color:var(--red)}
.guess-input-row{display:flex;gap:8px}
#guess-input{flex:1;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:15px;padding:10px 14px;outline:none;transition:border .15s}
#guess-input:focus{border-color:var(--accent)}
#guess-input::placeholder{color:var(--text-dim)}
.guess-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:10px 20px;cursor:pointer}
.hints-row{display:flex;gap:6px;margin-top:.75rem;flex-wrap:wrap}
.hint-btn{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;padding:5px 10px;cursor:pointer;transition:all .15s}
.hint-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.hint-btn:disabled{opacity:.4;cursor:default}
.hint-btn.used{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.hint-reveal{margin-top:.6rem;font-size:13px;color:var(--text-muted);min-height:18px;line-height:1.5}
.hint-reveal strong{color:var(--text-primary)}
.result-banner{margin-top:.75rem;border-radius:var(--radius-sm);overflow:hidden}
.result-msg{padding:.7rem 1rem;font-size:14px;font-weight:500;text-align:center}
.result-msg.success{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.3);color:#4ecf82}
.result-msg.fail{background:rgba(224,60,49,.1);border:1px solid rgba(224,60,49,.25);color:#f07068}
.post-game-btns{display:flex;gap:8px;margin-top:.75rem;justify-content:center}
.pg-btn{background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer}
.pg-btn:hover{border-color:var(--accent);color:var(--accent)}
.pg-btn.share-btn{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.archive-grid{display:flex;flex-direction:column;gap:8px}
.archive-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border .15s}
.archive-card:hover{border-color:var(--border-strong)}
.archive-card-player{font-size:15px;font-weight:500;color:var(--text-primary)}
.archive-card-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.archive-card-arrow{color:var(--text-dim);font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .5rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text-primary);line-height:1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dist-label{font-size:12px;color:var(--text-muted);width:50px;text-align:right;flex-shrink:0}
.dist-bar-wrap{flex:1;background:var(--bg-elevated);border-radius:3px;height:16px;overflow:hidden}
.dist-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.dist-n{font-size:12px;color:var(--text-muted);width:24px;text-align:right;flex-shrink:0}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;padding:.6rem 1.1rem;z-index:999;pointer-events:none;white-space:nowrap}
</style>
</head>

<header class="site-header">

</header>
<div class="view active" id="view-game">

  </div>

      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
    </div>
    <div class="guess-input-row">
      <input type="text" id="guess-input" placeholder="Type the missing club…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="guess-btn" onclick="submitGuess()">Guess</button>
    </div>
    <div class="hints-row">
      <button class="hint-btn" id="hint-btn-0" onclick="revealHint(0)">Hint 1</button>
      <button class="hint-btn" id="hint-btn-1" onclick="revealHint(1)">Hint 2</button>
      <button class="hint-btn" id="hint-btn-2" onclick="revealHint(2)">Hint 3</button>
    </div>
    <div class="hint-reveal" id="hint-reveal"></div>
    <div class="result-banner" id="result-banner"></div>
  </div>
  <div class="post-game-btns" id="post-game-btns" style="display:none">
    <button class="pg-btn share-btn" onclick="shareResult()">Share 📋</button>
    <button class="pg-btn" onclick="setView('archive')">Archive</button>
  </div>
</div>
<div class="view" id="view-archive">
  <div class="puzzle-badge" style="margin-bottom:1rem">All Puzzles</div>
  <div class="archive-grid" id="archive-grid"></div>
</div>
<div class="view" id="view-stats">
  <div class="puzzle-badge" style="margin-bottom:1rem">Your Stats</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" id="stat-played">0</div><div class="stat-label">Played</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-wins">0</div><div class="stat-label">Won</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Win %</div></div>
  </div>
  <div style="margin-bottom:.5rem;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Guess Distribution</div>
  <div class="dist-row"><div class="dist-label">1st</div><div class="dist-bar-wrap"><div class="dist-bar" id="dist-1" style="width:0%"></div></div><div class="dist-n" id="dist-1-n">0</div></div>

</div>

let state={puzzleIndex:0,attempts:0,maxAttempts:3,solved:false,failed:false,hintsUsed:[]};
let puzzle;
function loadStorage(){try{const r=localStorage.getItem('missingclub_v1');return r?JSON.parse(r):{stats:defaultStats(),sessions:{}};}catch{return{stats:defaultStats(),sessions:{}};}}
function saveStorage(d){try{localStorage.setItem('missingclub_v1',JSON.stringify(d));}catch{}}
function defaultStats(){return{played:0,wins:0,streak:0,bestStreak:0,dist:{1:0,2:0,3:0,miss:0}};}
let storage=loadStorage();
function getDailyPuzzleIndex(){const start=new Date("2025-01-01");const dayNum=Math.floor((new Date()-start)/86400000);return dayNum%PUZZLES.length;}
function normalise(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").trim();}
function checkGuess(guess,puzzle){const g=normalise(guess);return puzzle.acceptedAnswers.some(a=>normalise(a)===g);}
document.addEventListener('DOMContentLoaded',()=>{state.puzzleIndex=getDailyPuzzleIndex();loadPuzzle(state.puzzleIndex);renderArchive();renderStats();document.getElementById('guess-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});});
function loadPuzzle(idx){
  puzzle=PUZZLES[idx];state.puzzleIndex=idx;state.attempts=0;state.solved=false;state.failed=false;state.hintsUsed=[];
  document.getElementById('puzzle-badge').textContent='PUZZLE #'+puzzle.id;
  document.getElementById('puzzle-title').textContent=puzzle.player;
  document.getElementById('puzzle-sub').textContent=puzzle.nationality+' · '+puzzle.position+' · Guess the missing club';
  renderTimeline(puzzle,false);resetPips();
  document.getElementById('result-banner').innerHTML='';document.getElementById('hint-reveal').innerHTML='';
  document.getElementById('post-game-btns').style.display='none';document.getElementById('guess-section').style.display='block';document.getElementById('guess-input').value='';
  [0,1,2].forEach(i=>{const b=document.getElementById('hint-btn-'+i);if(b){b.classList.remove('used');b.disabled=false;}});
  const saved=storage.sessions['p'+idx];
  if(saved){state.attempts=saved.attempts;state.solved=saved.solved;state.failed=saved.failed;state.hintsUsed=saved.hintsUsed||[];state.hintsUsed.forEach(h=>markHintUsed(h));if(saved.hintTexts)document.getElementById('hint-reveal').innerHTML=saved.hintTexts;[0,1,2].forEach((pip,i)=>{const el=document.getElementById('pip-'+i);if(el&&saved.pips&&saved.pips[i])el.classList.add(saved.pips[i]);});if(state.solved||state.failed)showEndState(state.solved,puzzle);renderTimeline(puzzle,state.solved||state.failed);}
}
function renderTimeline(puzzle,reveal){
  const tl=document.getElementById('timeline');tl.innerHTML='';
  puzzle.clubs.forEach((club,i)=>{
    const isMissing=puzzle.missingIndex!==undefined?(i===puzzle.missingIndex):(club.name==='???');const row=document.createElement('div');row.className='club-row';
    const num=document.createElement('div');num.className='club-num';num.textContent=i+1;
    const dot=document.createElement('div');dot.className='club-dot '+(isMissing?'missing':'known');
    const info=document.createElement('div');info.className='club-info';
    if(isMissing&&!reveal){info.innerHTML='<div class="missing-slot">???</div>';}
    else{const dn=isMissing&&reveal?'<span style="color:'+(state.solved?'var(--green)':'var(--red)')+'">'+puzzle.answer+'</span>':club.name;const leagueSpan=club.league?' · <span class="club-league">'+club.league+'</span>':'';info.innerHTML='<div class="club-name">'+dn+'</div><div class="club-years">'+club.years+leagueSpan+'</div>';}
    row.appendChild(num);row.appendChild(dot);row.appendChild(info);tl.appendChild(row);
  });
}
function submitGuess(){
  if(state.solved||state.failed)return;const input=document.getElementById('guess-input');const val=input.value.trim();if(!val){input.focus();return;}
  const puzzle=PUZZLES[state.puzzleIndex];const correct=checkGuess(val,puzzle);const pip=document.getElementById('pip-'+state.attempts);
  if(correct){pip.classList.add('correct');state.solved=true;recordResult(true,state.attempts+1);showEndState(true,puzzle);renderTimeline(puzzle,true);}
  else{pip.classList.add('wrong');state.attempts++;if(state.attempts>=state.maxAttempts){state.failed=true;recordResult(false,0);showEndState(false,puzzle);renderTimeline(puzzle,true);}else{const remaining=state.maxAttempts-state.attempts;document.getElementById('result-banner').innerHTML='<div class="result-msg fail">✗ Not quite — '+remaining+' attempt'+(remaining===1?'':'s')+' left</div>';}}
  input.value='';saveSession();
}
function showEndState(won,puzzle){
  const banner=document.getElementById('result-banner');
  if(won){banner.innerHTML='<div class="result-msg success">✓ Correct! The missing club was <strong>'+puzzle.answer+'</strong></div>';}
  else{banner.innerHTML='<div class="result-msg fail">The missing club was <strong>'+puzzle.answer+'</strong></div>';}
  document.getElementById('guess-section').querySelector('.guess-input-row').style.display='none';document.getElementById('post-game-btns').style.display='flex';
}
function revealHint(n){
  if(state.solved||state.failed||state.hintsUsed.includes(n))return;const puzzle=PUZZLES[state.puzzleIndex];state.hintsUsed.push(n);markHintUsed(n);
  const labels=['Country/League','City/Region','Clue'];const el=document.getElementById('hint-reveal');const sep=el.innerHTML?'<br>':'';
  el.innerHTML=el.innerHTML+sep+'<strong>'+labels[n]+':</strong> '+puzzle.hints[n];saveSession({hintsUsed:state.hintsUsed,hintTexts:el.innerHTML});
}
function markHintUsed(n){const b=document.getElementById('hint-btn-'+n);if(b){b.classList.add('used');b.disabled=true;}}
function resetPips(){[0,1,2].forEach(i=>{const p=document.getElementById('pip-'+i);if(p)p.className='pip';});}
function getPipStates(){return[0,1,2].map(i=>{const p=document.getElementById('pip-'+i);if(p){if(p.classList.contains('correct'))return'correct';if(p.classList.contains('wrong'))return'wrong';}return null;});}
function saveSession(extra){const key='p'+state.puzzleIndex;storage.sessions[key]=Object.assign(storage.sessions[key]||{},{attempts:state.attempts,solved:state.solved,failed:state.failed},extra);if(!extra?.pips)storage.sessions[key].pips=getPipStates();saveStorage(storage);}
function recordResult(won,guessNum){const s=storage.stats;s.played++;if(won){s.wins++;s.streak++;if(s.streak>s.bestStreak)s.bestStreak=s.streak;s.dist[guessNum]=(s.dist[guessNum]||0)+1;}else{s.streak=0;s.dist.miss=(s.dist.miss||0)+1;}saveStorage(storage);}
function renderStats(){const s=storage.stats;document.getElementById('stat-played').textContent=s.played;document.getElementById('stat-wins').textContent=s.wins;document.getElementById('stat-streak').textContent=s.streak;document.getElementById('stat-pct').textContent=s.played?Math.round(s.wins/s.played*100)+'%':'0%';const max=Math.max(1,s.dist[1]||0,s.dist[2]||0,s.dist[3]||0,s.dist.miss||0);['1','2','3','miss'].forEach(k=>{const v=s.dist[k]||0;const bar=document.getElementById('dist-'+k);const num=document.getElementById('dist-'+k+'-n');if(bar)bar.style.width=(v/max*100)+'%';if(num)num.textContent=v;});}
function renderArchive(){const grid=document.getElementById('archive-grid');grid.innerHTML='';PUZZLES.forEach((puzzle,idx)=>{const card=document.createElement('div');card.className='archive-card';const sess=storage.sessions['p'+idx];const status=sess?.solved?'✓':sess?.failed?'✗':'';card.innerHTML='<div><div class="archive-card-player">'+(status?status+' ':'')+puzzle.player+'</div><div class="archive-card-sub">'+puzzle.nationality+' · '+puzzle.position+'</div></div><div class="archive-card-arrow">›</div>';card.addEventListener('click',()=>{loadPuzzle(idx);setView('game');});grid.appendChild(card);});}
function showShareOptions(text) {
  // Try native share first (mobile)
  if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
    navigator.share({ text }).catch(() => copyToClipboard(text));
    return;
  }
  // On desktop: copy to clipboard + show WhatsApp button
  copyToClipboard(text);
  // Show a WhatsApp share option in the toast
  const waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.cssText = 'display:flex;align-items:center;gap:.75rem;';
  t.innerHTML = '<span>Copied!</span><a href="' + waUrl + '" target="_blank" style="color:#25D366;font-weight:600;text-decoration:none;font-size:13px;">WhatsApp ↗</a>';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function shareResult() {
  const icons = getPipStates().filter(p => p !== null).map(p => p === 'correct' ? '🟩' : '🟥').join('');
  const solved = state.solved;
  const line1 = '🏟️ Missing Club #' + puzzle.id;
  const line2 = solved
    ? icons + '  Solved in ' + state.attempts + '!'
    : icons + '  Not today!';
  const line3 = 'missingfootball.com/missing-club';
  const text = line1 + '\n' + line2 + '\n' + line3;
  showShareOptions(text);
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
function setView(view){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('view-'+view).classList.add('active');document.querySelector('[data-view="'+view+'"]').classList.add('active');if(view==='stats')renderStats();if(view==='archive')renderArchive();}
</script>
